<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/jpeg" href="../Logo.jpg"/>
  <title>Sections – Mindful School of Berlyn Achievers</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../Component/Navbar.css"/>
  <link rel="stylesheet" href="Section_Page.css"/>
</head>
<body data-page="sections">

  <!-- Navbar + Sidebar injected here -->
  <div id="navbar-placeholder"></div>

  <div class="layout">
    <main class="main-content">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h2 class="page-title">Sections</h2>
          <p class="page-subtitle">Manage class sections</p>
        </div>
        <button class="btn-add" id="addSectionBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Section
        </button>
      </div>

      <!-- Search Bar -->
      <div class="search-bar-wrap">
        <div class="search-input-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search sections by name, grade, adviser..." oninput="handleSearch(this.value)" />
          <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none;">✕</button>
        </div>
      </div>

      <!-- Sections Container -->
      <div class="sections-container" id="sectionsContainer">

        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="1.2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
          </div>
          <p class="empty-text">No sections yet</p>
          <button class="btn-create-first" id="createFirstBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Create First Section
          </button>
        </div>

        <!-- Sections Grid -->
        <div class="sections-grid" id="sectionsGrid"></div>

      </div>

    </main>
  </div>

  <!-- ===== ADD/EDIT SECTION MODAL ===== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="sectionModal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Section</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="sectionName">Section Name <span class="required">*</span></label>
          <input type="text" id="sectionName" placeholder="e.g. Section A – Grade 10"/>
          <span class="error-msg" id="sectionNameError"></span>
        </div>
        <div class="form-group">
          <label for="sectionGrade">Grade Level</label>
          <select id="sectionGrade">
            <option value="" disabled hidden>Select grade level</option>
            <option value="Grade 7">Grade 7</option>
            <option value="Grade 8">Grade 8</option>
            <option value="Grade 9">Grade 9</option>
            <option value="Grade 10">Grade 10</option>
            <option value="Grade 11">Grade 11</option>
            <option value="Grade 12">Grade 12</option>
          </select>
        </div>
        <div class="form-group">
          <label for="sectionAdviser">Adviser <span style="font-size:11px;color:#6b7280;">(auto-filled)</span></label>
          <input type="text" id="sectionAdviser" readonly
            style="background:#f3f4f6;color:#6b7280;cursor:not-allowed;"/>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn-save" id="modalSave">Save Section</button>
      </div>
    </div>
  </div>

  <!-- ===== DELETE CONFIRM MODAL ===== -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal modal-sm" id="deleteModal">
      <div class="modal-header">
        <h3>Delete Section</h3>
        <button class="modal-close" id="deleteClose">&times;</button>
      </div>
      <div class="modal-body">
        <p class="delete-msg">Are you sure you want to delete <strong id="deleteSectionName"></strong>? This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="deleteCancelBtn">Cancel</button>
        <button class="btn-delete" id="deleteConfirmBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="../config.js"></script>
  <script src="../Component/Navbar.js"></script>
  <script src="Section_Page.js"></script>
  <script src="../Component/AuthDelete.js"></script>
</body>
</html>
