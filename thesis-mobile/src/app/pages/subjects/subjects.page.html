<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="goBack()"><ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon></ion-button>
    </ion-buttons>
    <ion-title>Subjects</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openModal()"><ion-icon name="add-outline" slot="icon-only"></ion-icon></ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  <div style="padding:16px 16px 0;">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" [(ngModel)]="searchQuery"
        (input)="onSearch()" placeholder="Search subjects by name or code..." />
      <button class="search-clear" *ngIf="searchQuery" (click)="clearSearch()">✕</button>
    </div>
  </div>

  <div *ngIf="isLoading" style="display:flex;justify-content:center;padding:40px;">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <div *ngIf="!isLoading && filtered.length === 0" class="empty-state">
    <ion-icon name="book-outline"></ion-icon>
    <h3>No subjects yet</h3>
    <p>Tap + to add your first subject</p>
  </div>

  <div *ngIf="!isLoading && filtered.length > 0" style="padding:16px;">
    <div *ngFor="let s of filtered" class="item-card">
      <div class="item-icon yellow"><ion-icon name="book-outline"></ion-icon></div>
      <div class="item-info">
        <div class="item-title">{{ s.name }}</div>
        <div class="item-sub" *ngIf="s.code">Code: {{ s.code }}</div>
        <div class="item-sub" *ngIf="s.grade">{{ s.grade }}</div>
      </div>
      <div class="item-actions">
        <button class="action-btn edit" (click)="openEditModal(s)"><ion-icon name="create-outline"></ion-icon></button>
        <button class="action-btn delete" (click)="confirmDelete(s)"><ion-icon name="trash-outline"></ion-icon></button>
      </div>
    </div>
  </div>
</ion-content>

<ion-modal [isOpen]="showModal" (didDismiss)="closeModal()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>{{ editing ? 'Edit Subject' : 'Add Subject' }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeModal()"><ion-icon name="close-outline" slot="icon-only"></ion-icon></ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content style="--background:#f0f2f7;">
      <div style="padding:20px;">
        <div class="field-group">
          <label class="field-label">Subject Name *</label>
          <input class="field-input" [(ngModel)]="form.name" placeholder="e.g. Mathematics" />
        </div>
        <div class="field-group">
          <label class="field-label">Subject Code</label>
          <input class="field-input" [(ngModel)]="form.code" placeholder="e.g. MATH101" />
        </div>
        <div class="field-group">
          <label class="field-label">Grade Level</label>
          <select class="field-input" [(ngModel)]="form.grade">
            <option value="" disabled hidden>Select grade</option>
            <option>Grade 7</option><option>Grade 8</option>
            <option>Grade 9</option><option>Grade 10</option>
            <option>Grade 11</option><option>Grade 12</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Description</label>
          <input class="field-input" [(ngModel)]="form.description" placeholder="Optional description" />
        </div>
        <button class="submit-btn" (click)="save()" [disabled]="isSaving">
          {{ isSaving ? 'Saving...' : (editing ? 'Update Subject' : 'Save Subject') }}
        </button>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>

<ion-footer>
  <app-bottom-nav activePage="subjects"></app-bottom-nav>
</ion-footer>
