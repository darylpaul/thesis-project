<ion-tab-bar slot="bottom">

  <ion-tab-button (click)="goTo('dashboard')" [class.active-tab]="activePage === 'dashboard'">
    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <ion-label>Home</ion-label>
  </ion-tab-button>

  <ion-tab-button (click)="goTo('scan')" [class.active-tab]="activePage === 'scan'">
    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <ion-label>Scan</ion-label>
  </ion-tab-button>

  <ion-tab-button (click)="goTo('students')" [class.active-tab]="activePage === 'students'">
    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    <ion-label>Students</ion-label>
  </ion-tab-button>

  <ion-tab-button (click)="goTo('subjects')" [class.active-tab]="activePage === 'subjects'">
    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    <ion-label>Subjects</ion-label>
  </ion-tab-button>

  <ion-tab-button (click)="goTo('sections')" [class.active-tab]="activePage === 'sections'">
    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
    </svg>
    <ion-label>Sections</ion-label>
  </ion-tab-button>

</ion-tab-bar>
