<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/jpeg" href="../Logo.jpg"/>
  <title>Answer Keys – Mindful School of Berlyn Achievers</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../Component/Navbar.css?v=2"/>
  <link rel="stylesheet" href="Answer_Keys.css"/>
</head>
<body data-page="answerkeys">

  <!-- Navbar + Sidebar injected here -->
  <div id="navbar-placeholder"></div>

  <div class="layout">
    <main class="main-content">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h2 class="page-title">Answer Keys</h2>
          <p class="page-subtitle">View auto-generated exam answer keys</p>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="filter-group">
          <label class="filter-label">Section</label>
          <div class="select-wrap">
            <select id="sectionFilter">
              <option value="" disabled hidden>Select section</option>
            </select>
            <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
              fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Subject</label>
          <div class="select-wrap">
            <select id="subjectFilter">
              <option value="" disabled hidden>Select subject</option>
            </select>
            <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
              fill="none" viewBox="0 0 24 24" stroke="#6b7280" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Answer Keys Container -->
      <!-- Search Bar -->
      <div class="search-bar-wrap">
        <div class="search-input-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search answer keys by title or type..." oninput="handleSearch(this.value)" />
          <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none;">✕</button>
        </div>
      </div>

      <div class="answerkeys-container" id="answerkeysContainer">

        <!-- Prompt state -->
        <div class="prompt-state" id="promptState">
          <div class="prompt-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" fill="none"
              viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="1.2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <polyline points="9 15 11 17 15 13"/>
            </svg>
          </div>
          <p class="prompt-text">Select a section and subject to view answer keys</p>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" style="display:none;">
          <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" fill="none"
              viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="1.2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <polyline points="9 15 11 17 15 13"/>
            </svg>
          </div>
          <p class="empty-text">No answer keys found for this selection</p>
          <p class="empty-hint">Answer keys are auto-generated when a questionnaire is created.</p>
        </div>

        <!-- Answer Keys List -->
        <div class="answerkeys-list" id="answerkeysList" style="display:none;"></div>

      </div>
    </main>
  </div>

  <!-- ===== VIEW ANSWER KEY MODAL ===== -->
  <div class="modal-overlay" id="viewOverlay">
    <div class="ak-pdf-wrapper">
      <div class="ak-pdf-toolbar">
        <span id="viewToolbarTitle" style="font-weight:700;font-size:0.875rem;color:#1e2d6b;"></span>
        <button class="modal-close" id="viewClose">&times;</button>
      </div>
      <div class="ak-pdf-page" id="viewBody"></div>
      <div class="ak-pdf-footer">
        <button class="btn-cancel" id="viewCloseBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="../config.js"></script>
  <script src="../Component/Navbar.js?v=2"></script>
  <script src="Answer_Keys.js"></script>
  <script src="../Component/AuthDelete.js"></script>
</body>
</html>
